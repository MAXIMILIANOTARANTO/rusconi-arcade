<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RUSCONI · Arcade 80s·90s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0c021f; --void-2:#19053a;
    --magenta:#ff2e97; --cyan:#05d9e8; --gold:#ffd319; --paper:#f3eaff;
    --celeste:#75aadb; --sun:#f6b40e; --ink:#0b2545; --white:#f7fbff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    min-height:100dvh; font-family:"Chakra Petch",system-ui,sans-serif; color:var(--paper);
    background:radial-gradient(120% 80% at 50% -10%, var(--void-2) 0%, var(--void) 55%, #050010 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(14px,4vw,26px);
    padding:max(20px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));
    overflow-x:hidden; position:relative;
  }
  body::before{
    content:""; position:fixed; inset:auto 0 0 0; height:42vh; z-index:0; pointer-events:none;
    background:linear-gradient(transparent, rgba(255,46,151,.06)),
      repeating-linear-gradient(transparent 0 38px, rgba(5,217,232,.16) 38px 40px);
    transform:perspective(40vh) rotateX(72deg); transform-origin:bottom;
    mask-image:linear-gradient(transparent, #000 60%);
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:60; pointer-events:none;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);
    mix-blend-mode:multiply;
  }
  .stage{position:relative; z-index:5; width:100%; max-width:440px; display:flex; flex-direction:column; align-items:center; gap:clamp(14px,4vw,24px)}
  header{text-align:center; line-height:1}
  .eyebrow{font-family:"Press Start 2P",monospace; font-size:.58rem; letter-spacing:.18em; color:var(--cyan); text-shadow:0 0 10px rgba(5,217,232,.7)}
  h1{font-family:"Press Start 2P",monospace; font-size:clamp(1.35rem,8vw,2rem); margin:.55rem 0 .35rem; color:var(--paper); text-shadow:3px 3px 0 var(--magenta), -2px -2px 0 var(--cyan)}
  .sub{font-size:.85rem; letter-spacing:.3em; color:var(--gold); text-transform:uppercase}

  .screen{
    position:relative; width:100%; aspect-ratio:1/1; border-radius:18px; padding:10px;
    background:linear-gradient(145deg,#2a0a55,#0a0220);
    box-shadow:0 0 0 2px rgba(255,46,151,.55),0 0 26px rgba(255,46,151,.45),0 0 60px rgba(5,217,232,.25),inset 0 0 30px rgba(0,0,0,.6);
  }
  .tube{position:absolute; inset:10px; border-radius:10px; overflow:hidden; background:#000}
  .tube video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; display:block; background:transparent}

  .tap{
    position:absolute; inset:10px; z-index:9; border:none; border-radius:10px; cursor:pointer;
    background:rgba(5,2,20,.45); color:var(--paper); font-family:"Press Start 2P",monospace;
    font-size:.6rem; letter-spacing:.06em; line-height:1.6; text-align:center; display:grid; place-items:center; backdrop-filter:blur(2px);
  }

  .sound{
    position:absolute; right:16px; bottom:16px; z-index:8; width:46px; height:46px; border-radius:50%;
    border:2px solid var(--cyan); background:rgba(5,5,16,.72); color:var(--cyan); font-size:1.15rem; cursor:pointer;
    display:grid; place-items:center; backdrop-filter:blur(4px);
  }

  .hud{
    position:absolute; top:16px; left:16px; right:16px; z-index:10;
    display:flex; justify-content:space-between; align-items:center;
    font-family:"Press Start 2P",monospace; font-size:.7rem;
  }
  .score{color:var(--gold); text-shadow:0 0 8px var(--gold)}
  .highscore{color:var(--cyan); opacity:.8}

  .controls{width:100%; display:flex; flex-direction:column; gap:12px; margin-top:8px}
  .btn{
    --c:var(--magenta); font-family:"Press Start 2P",monospace; font-size:.78rem; letter-spacing:.04em;
    color:#0c021f; background:var(--c); border:none; border-radius:14px; padding:18px 16px;
    display:flex; align-items:center; justify-content:center; gap:12px; cursor:pointer;
    box-shadow:0 6px 0 color-mix(in srgb,var(--c) 60%, #000);
    transition:transform .08s ease, box-shadow .08s ease;
    width:100%;
  }
  .btn:active{transform:translateY(5px); box-shadow:0 1px 0 color-mix(in srgb,var(--c) 60%, #000)}
  .btn.gold{--c:var(--gold)}
  .btn.cyan{--c:var(--cyan)}

  .champ{
    position:fixed; inset:0; z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; text-align:center; color:var(--ink); padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
    background:linear-gradient(180deg,var(--celeste) 0%, var(--white) 45%, var(--celeste) 100%); overflow:hidden;
  }
  .champ.open{display:flex}
  .champ .back{
    position:absolute; top:max(14px,env(safe-area-inset-top)); left:14px;
    font-family:"Press Start 2P",monospace; font-size:.55rem; color:var(--ink);
    background:rgba(247,251,255,.85); border:2px solid var(--ink); padding:9px 12px; border-radius:10px; cursor:pointer;
  }
  .champ h2{font-family:"Press Start 2P",monospace; font-size:clamp(1rem,5.5vw,1.5rem); line-height:1.5; text-shadow:2px 2px 0 var(--sun); z-index:2}
  .frame{
    width:min(82vw,380px); aspect-ratio:4/5; border-radius:16px; overflow:hidden; background:#cfe2f5;
    border:5px solid var(--white); box-shadow:0 12px 40px rgba(11,37,69,.35); display:grid; place-items:center; z-index:2;
  }
  .frame img{width:100%; height:100%; object-fit:cover; display:block}
  .row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; z-index:2}
  .pill{
    font-family:"Chakra Petch",sans-serif; font-weight:600; font-size:.92rem; color:var(--ink);
    cursor:pointer; background:var(--white); border:2px solid var(--ink); border-radius:999px; padding:11px 16px;
  }
  .pill.sun{background:var(--sun); border-color:#9a6b00}
  .confetti{position:absolute; top:-10px; width:9px; height:14px; opacity:.9; animation:fall linear infinite; z-index:1}
  @keyframes fall{to{transform:translateY(108vh) rotate(540deg)}}
</style>
</head>
<body>
  <div class="stage">
    <header>
      <div class="eyebrow">PRESS · START</div>
      <h1>RUSCONI</h1>
      <div class="sub">Arcade · 80s · 90s</div>
    </header>

    <div class="screen" id="screen">
      <div class="tube">
        <video id="clip" playsinline webkit-playsinline></video>
      </div>

      <!-- HUD de puntuación -->
      <div class="hud">
        <div><span class="score" id="score">000000</span></div>
        <div><span class="highscore">HI <span id="highscore">000000</span></span></div>
      </div>

      <button class="tap" id="tapPlay">TOCA PARA JUGAR</button>
      <button class="sound" id="soundBtn">🔇</button>
    </div>

    <div class="controls">
      <button class="btn" id="hitBtn">🔥 <span>HIT THE BUNNY</span></button>
      <button class="btn gold" id="champBtn">⭐ <span>VER CAMPEÓN</span></button>
      <button class="btn cyan" id="resetBtn">RESET SCORE</button>
    </div>
  </div>

  <!-- OVERLAY CAMPEÓN -->
  <div class="champ" id="champ" aria-hidden="true">
    <button class="back" id="backBtn">← VOLVER</button>
    <h2>¡CAMPEÓN DEL MUNDO!</h2>
    <div class="stars">★ ★ ★</div>

    <div class="frame" id="frame">
      <div class="ph">
        <div class="tag">SUBÍ TU FOTO</div>
        <p>El día que la Argentina se convirtió en campeona del mundo</p>
        <label class="pill sun">
          Cargar foto
          <input type="file" id="photoIn" accept="image/*">
        </label>
      </div>
    </div>

    <div class="row">
      <label class="pill">
        Cargar Himno
        <input type="file" id="himnoIn" accept="audio/*">
      </label>
      <button class="pill sun" id="playHimno">Reproducir Himno</button>
    </div>
  </div>

<script>
// ==================== NÚCLEO FUNCIONAL ====================
const $ = id => document.getElementById(id);

const video = $('clip');
const tapBtn = $('tapPlay');
const soundBtn = $('soundBtn');
const hitBtn = $('hitBtn');
const champBtn = $('champBtn');
const resetBtn = $('resetBtn');
const champScreen = $('champ');
const scoreEl = $('score');
const highscoreEl = $('highscore');

let score = 0;
let highscore = parseInt(localStorage.getItem('rusconi_highscore')) || 124000;

// Actualizar HUD
function updateHUD() {
  scoreEl.textContent = String(score).padStart(6, '0');
  highscoreEl.textContent = String(highscore).padStart(6, '0');
}

// Cargar high score
updateHUD();

// ==================== VIDEO ====================
// Usamos un video público ligero de ejemplo (puedes reemplazarlo)
const VIDEO_URL = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny_320x180.mp4';

video.src = VIDEO_URL;
video.loop = true;
video.muted = true;
video.playsInline = true;

// Intentar reproducir automáticamente
tapBtn.addEventListener('click', () => {
  video.play().then(() => {
    tapBtn.style.display = 'none';
  }).catch(() => {
    tapBtn.style.display = 'grid';
  });
});

// Sonido
tap soundBtn.addEventListener('click', () => {
  video.muted = !video.muted;
  soundBtn.textContent = video.muted ? '🔇' : '🔊';
  if (!video.muted) video.play();
});

// ==================== MECÁNICA DE JUEGO ====================
function addScore(points) {
  score += points;
  if (score > highscore) {
    highscore = score;
    localStorage.setItem('rusconi_highscore', highscore);
  }
  updateHUD();

  // Efecto visual
  scoreEl.style.transform = 'scale(1.3)';
  setTimeout(() => scoreEl.style.transform = 'scale(1)', 120);
}

// Botón principal de interacción (Hit the Bunny)
hitBtn.addEventListener('click', () => {
  addScore(1250);
  // Pequeño feedback visual
  hitBtn.style.transform = 'scale(0.92)';
  setTimeout(() => hitBtn.style.transform = 'scale(1)', 80);
});

// Reset
resetBtn.addEventListener('click', () => {
  score = 0;
  updateHUD();
});

// ==================== PANTALLA CAMPEÓN ====================
champBtn.addEventListener('click', () => {
  champScreen.classList.add('open');
  champScreen.setAttribute('aria-hidden', 'false');
  spawnConfetti();
});

$('backBtn').addEventListener('click', () => {
  champScreen.classList.remove('open');
  champScreen.setAttribute('aria-hidden', 'true');
});

// Cargar foto
$('photoIn').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    $('frame').innerHTML = `<img src="${ev.target.result}" alt="Foto del campeón">`;
  };
  reader.readAsDataURL(file);
});

// Himno
let himnoAudio = new Audio();
$('himnoIn').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  himnoAudio.src = URL.createObjectURL(file);
});

$('playHimno').addEventListener('click', () => {
  if (himnoAudio.src) {
    himnoAudio.play();
  } else {
    alert('Primero cargá un archivo de audio (el himno)');
  }
});

// Confeti
function spawnConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const existing = document.querySelectorAll('.confetti');
  existing.forEach(el => el.remove());

  const colors = ['#75aadb', '#ffffff', '#f6b40e'];
  for (let i = 0; i < 28; i++) {
    const c = document.createElement('span');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (3 + Math.random() * 2.5) + 's';
    c.style.animationDelay = (Math.random() * 2) + 's';
    champScreen.appendChild(c);
  }
}

// Bonus automático cada cierto tiempo (para que se sienta vivo)
setInterval(() => {
  if (document.visibilityState === 'visible' && score > 0) {
    addScore(350);
  }
}, 8500);

// Mensaje inicial
console.log('%c[RUSCONI] Experiencia funcional cargada ✓', 'color:#05d9e8');
</script>
</body>
</html>
