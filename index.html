<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUSCONI · Venti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #0c021f;
    color: #f3eaff;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 20px;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #ff2e97;
    text-shadow: 3px 3px 0 #05d9e8;
  }
  .video-container {
    width: 100%;
    max-width: 420px;
    border: 4px solid #ff2e97;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255, 46, 151, 0.5);
    margin-bottom: 30px;
  }
  video {
    width: 100%;
    display: block;
  }
  .link {
    display: inline-block;
    background: #ffd319;
    color: #0c021f;
    padding: 18px 32px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1rem;
    font-weight: bold;
    box-shadow: 0 6px 0 #9a6b00;
    transition: transform 0.1s ease;
  }
  .link:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #9a6b00;
  }
</style>
</head>
<body>

  <h1>RUSCONI</h1>
  <p style="margin-bottom: 30px; color: #05d9e8; font-size: 0.9rem;">80s · 90s</p>

  <div class="video-container">
    <video id="clip" autoplay loop muted playsinline>
      <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny_320x180.mp4" type="video/mp4">
    </video>
  </div>

  <a href="https://maximilianotaranto.medium.com" class="link" target="_blank">
    IR A VALENTINA VALIENTE (VENTI)
  </a>

<script>
  const video = document.getElementById('clip');
  
  // Intentar reproducir automáticamente
  video.play().catch(() => {
    // Si falla el autoplay, mostramos un mensaje sutil
    console.log('Autoplay bloqueado, esperando interacción');
  });

  // Si el usuario toca la pantalla, intentamos reproducir
  document.body.addEventListener('click', () => {
    if (video.paused) {
      video.play();
    }
  }, { once: true });
</script>

</body>
</html>
